services:
  golem:
    image: golembot:fix
    ports:
      - "3003:3000"
    volumes:
      - ./golem.yaml:/assistant/golem.yaml:ro
      - ./.golem:/assistant/.golem
      - ./.claude.json:/home/golem/.claude.json
      - ./.claude/settings.json:/home/golem/.claude/settings.json
      - ./skills:/home/golem/.claude/skills
    restart: unless-stopped
    environment:
      - NODE_ENV=production
