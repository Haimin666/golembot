<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#161B22"/>
    </linearGradient>
    <linearGradient id="clay" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4A574"/>
      <stop offset="100%" stop-color="#A0724A"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7DF9FF"/>
      <stop offset="100%" stop-color="#4FC3F7"/>
    </linearGradient>
    <filter id="eyeglow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="textglow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.03" stroke="#fff" stroke-width="1">
    <line x1="0" y1="80" x2="1280" y2="80"/><line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="240" x2="1280" y2="240"/><line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="400" x2="1280" y2="400"/><line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="0" y1="560" x2="1280" y2="560"/>
    <line x1="160" y1="0" x2="160" y2="640"/><line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="480" y1="0" x2="480" y2="640"/><line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="800" y1="0" x2="800" y2="640"/><line x1="960" y1="0" x2="960" y2="640"/>
    <line x1="1120" y1="0" x2="1120" y2="640"/>
  </g>

  <!-- Golem head - centered top -->
  <rect x="540" y="50" width="200" height="200" rx="30" fill="url(#clay)"/>
  <path d="M580 70 L598 100 L587 93" stroke="#8B6942" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M680 67 L668 92 L676 86" stroke="#8B6942" stroke-width="3" fill="none" stroke-linecap="round"/>
  <rect x="572" y="120" width="44" height="32" rx="6" fill="#0D1117"/>
  <rect x="664" y="120" width="44" height="32" rx="6" fill="#0D1117"/>
  <rect x="576" y="124" width="36" height="24" rx="4" fill="url(#glow)" filter="url(#eyeglow)"/>
  <rect x="668" y="124" width="36" height="24" rx="4" fill="url(#glow)" filter="url(#eyeglow)"/>
  <rect x="602" y="188" width="76" height="8" rx="4" fill="#8B6942"/>
  <text x="640" y="106" text-anchor="middle" font-family="serif" font-size="28" font-weight="bold" fill="#8B6942" opacity="0.7">&#x05D0;</text>

  <!-- GolemBot text - centered below head -->
  <text x="640" y="330" text-anchor="middle" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="80" font-weight="700" fill="#E6EDF3">GolemBot</text>
  <text x="640" y="330" text-anchor="middle" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="80" font-weight="700">
    <tspan fill="transparent">Golem</tspan><tspan fill="url(#glow)" filter="url(#textglow)">Bot</tspan>
  </text>

  <!-- Tagline -->
  <text x="640" y="400" text-anchor="middle" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="26" fill="#8B949E">Your Coding Agent is trapped in a terminal.</text>
  <text x="640" y="440" text-anchor="middle" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="26" fill="url(#glow)">GolemBot sets it free.</text>

  <!-- Engine → Destinations -->
  <text x="640" y="520" text-anchor="middle" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="22" fill="#484F58">Cursor  ·  Claude Code  ·  OpenCode</text>
  <text x="640" y="555" text-anchor="middle" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="20" fill="#484F58">↓</text>
  <text x="640" y="590" text-anchor="middle" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="22" fill="#7DF9FF">Feishu  ·  DingTalk  ·  WeCom  ·  Your Product</text>
</svg>
