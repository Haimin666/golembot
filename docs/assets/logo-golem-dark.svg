<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 180" fill="none">
  <defs>
    <linearGradient id="clay" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4A574"/>
      <stop offset="100%" stop-color="#A0724A"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7DF9FF"/>
      <stop offset="100%" stop-color="#4FC3F7"/>
    </linearGradient>
    <filter id="eyeglow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="textglow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Golem head - square, clay-like -->
  <rect x="20" y="15" width="150" height="150" rx="22" fill="url(#clay)"/>

  <!-- Forehead crack lines (clay texture) -->
  <path d="M55 30 L72 58 L62 52" stroke="#8B6942" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M118 28 L106 50 L114 44" stroke="#8B6942" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Eyes - glowing cyan representing the AI soul -->
  <rect x="46" y="68" width="34" height="24" rx="5" fill="#0D1117"/>
  <rect x="110" y="68" width="34" height="24" rx="5" fill="#0D1117"/>
  <rect x="49" y="71" width="28" height="18" rx="3" fill="url(#glow)" filter="url(#eyeglow)"/>
  <rect x="113" y="71" width="28" height="18" rx="3" fill="url(#glow)" filter="url(#eyeglow)"/>

  <!-- Mouth - straight line, stoic golem expression -->
  <rect x="62" y="120" width="66" height="7" rx="3" fill="#8B6942"/>

  <!-- Hebrew-inspired mark on forehead (aleph) -->
  <text x="95" y="56" text-anchor="middle" font-family="serif" font-size="20" font-weight="bold" fill="#8B6942" opacity="0.7">&#x05D0;</text>

  <!-- Text: GolemBot (one word, no gap) -->
  <text x="200" y="90" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="58" font-weight="700" fill="#E6EDF3">GolemBot</text>
  <text x="200" y="90" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="58" font-weight="700" fill="url(#glow)" opacity="0.15">GolemBot</text>
  <!-- Overlay just "Bot" portion with glow color -->
  <text x="200" y="90" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="58" font-weight="700" fill="url(#glow)" filter="url(#textglow)">
    <tspan fill="transparent">Golem</tspan><tspan fill="url(#glow)">Bot</tspan>
  </text>

  <!-- Tagline -->
  <text x="200" y="120" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="15" fill="#8B949E">Coding Agent = soul, GolemBot = body of clay</text>

  <!-- Terminal cursor blinking effect -->
  <rect x="200" y="138" width="10" height="20" rx="1" fill="url(#glow)" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0;0.8" dur="1.2s" repeatCount="indefinite"/>
  </rect>
</svg>
