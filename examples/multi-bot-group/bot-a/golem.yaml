name: researcher
engine: claude-code

# Researcher bot uses "smart" mode: it observes all messages and only speaks
# when it has something important to add, otherwise outputs [PASS].
groupChat:
  groupPolicy: smart
  historyLimit: 20
  maxTurns: 6

channels:
  mock-group:
    _adapter: ../adapters/mock-group-adapter.mjs
    botName: researcher
